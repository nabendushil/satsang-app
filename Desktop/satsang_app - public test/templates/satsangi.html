<!DOCTYPE html>
<html>
<head>
<title>Satsangi List</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    text-align: center;
    color: white;
}

/* 🌟 TITLE */
h1 {
    font-size: 36px;
    color: gold;
    margin-top: 20px;
}

/* 🔍 SEARCH BOX */
.search-box {
    margin: 20px;
}

input {
    padding: 12px;
    width: 260px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    outline: none;
    backdrop-filter: blur(10px);
}

input::placeholder {
    color: #ccc;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: gold;
    color: black;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* 📦 GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* NAME CARD */
.name-box {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 215, 0, 0.15);
    padding: 18px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
    transition: 0.2s;
    backdrop-filter: blur(10px);
}

.name-box:hover {
    transform: scale(1.05);
    border-color: gold;
}

/* 🏠 HOME BUTTON */
.home-btn {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: rgba(255, 215, 0, 0.2);
    color: gold;
    cursor: pointer;
}

.home-btn:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<h1>👤 Satsangi List</h1>

<!-- 🔍 SEARCH (NEW SYSTEM - NO JS) -->
<div class="search-box">
    <form method="POST" action="/satsangi_search">
        <input type="text" name="name" placeholder="🔍 Search a name" required>
        <button type="submit">Search</button>
    </form>
</div>

<!-- 🏠 HOME -->
<button class="home-btn" onclick="location.href='/'">🏠 Back to Home</button>

<!-- 📋 LIST -->
<div class="container">
    {% for i in range(names|length) %}
        <div class="name-box">
            {{ i + 1 }}. {{ names[i] }}
        </div>
    {% endfor %}
</div>

</body>
</html>
