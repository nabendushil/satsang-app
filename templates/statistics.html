<!DOCTYPE html>
<html>
<head>
<title>Statistics</title>

<style>

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: white;
    text-align: center;
}

/* 🌟 GOLD TITLE */
h1, h2, h3 {
    color: gold;
    letter-spacing: 1px;
}

/* 💳 TOP DASHBOARD GRID */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    max-width: 900px;
    margin: auto;
}

/* 💎 GLASS CARD STYLE */
.card {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 215, 0, 0.2);
    padding: 20px;
    border-radius: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.08);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.25);
}

/* 🔢 BIG NUMBERS (BANK STYLE) */
.card h2 {
    font-size: 28px;
    margin: 0;
}

/* 📅 MONTH BOX */
.month-box {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 215, 0, 0.15);
    padding: 15px;
    margin-top: 15px;
    border-radius: 15px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* 🔘 BUTTONS */
button {
    padding: 10px 14px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.yes {
    background: linear-gradient(45deg, #28a745, #5cff8a);
    color: black;
}

.no {
    background: linear-gradient(45deg, #dc3545, #ff6b6b);
    color: white;
}

.status {
    font-weight: bold;
    margin-top: 5px;
    color: #ffd700;
}

/* 📱 MOBILE FRIENDLY */
@media (max-width: 600px) {
    .card h2 {
        font-size: 22px;
    }
}
/* 🔝 TOP BAR */
.top-bar {
    display: flex;
    justify-content: flex-start;
    max-width: 900px;
    margin: 10px auto 20px auto;
}

/* 🏠 HOME BUTTON (MATCH THEME) */
.home-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    background: rgba(255, 255, 255, 0.05);
    color: gold;
    cursor: pointer;
    font-weight: bold;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.home-btn:hover {
    background: rgba(255, 215, 0, 0.15);
    transform: scale(1.05);
}
</style>
</head>

<body>

<h1>💳 Finance Dashboard</h1>
<div class="top-bar">
    <button class="home-btn" onclick="location.href='/'">🏠 Back to Home</button>
</div>
<div class="dashboard">

    <div class="card">
        <h2 id="people"></h2>
        <p>Total People</p>
    </div>

    <div class="card">
        <h2 id="paid"></h2>
        <p>Deposited</p>
    </div>

    <div class="card">
        <h2 id="pending"></h2>
        <p>Not Deposited</p>
    </div>

    <div class="card">
        <h2 id="money"></h2>
        <p>Total Collection</p>
    </div>

</div>

<h2>📅 Monthly Deposit Status</h2>

<div id="months"></div>

<script>

const data = {{ data | tojson }};
const monthly_status = {{ monthly_status | tojson }};

function calculate() {

    const last = data[data.length - 1];

    let names = last.names;
    let amounts = last.amounts;

    let paid = 0, pending = 0, total = 0;

    for (let i = 0; i < amounts.length; i++) {
        total += amounts[i];
        if (amounts[i] > 0) paid++;
        else pending++;
    }

    document.getElementById("people").innerText = names.length;
    document.getElementById("paid").innerText = paid;
    document.getElementById("pending").innerText = pending;
    document.getElementById("money").innerText = "₹" + total;
}

function renderMonths() {

    const months = [
        "January 2026","February 2026","March 2026",
        "April 2026","May 2026","June 2026",
        "July 2026","August 2026","September 2026",
        "October 2026","November 2026","December 2026"
    ];

    const div = document.getElementById("months");
    div.innerHTML = "";

    months.forEach(m => {

        let status = monthly_status[m] || "no";

        let box = document.createElement("div");
        box.className = "month-box";

        box.innerHTML = `
            <h3>${m}</h3>
            <p class="status">Status: ${status.toUpperCase()}</p>
        `;

        if (status === "no") {
            let btn = document.createElement("button");
            btn.innerText = "Mark as PAID ✔";
            btn.className = "yes";

            btn.onclick = () => {
                fetch("/save_month_status", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: `month=${m}&status=yes`
                }).then(() => location.reload());
            };

            box.appendChild(btn);
        }

        div.appendChild(box);
    });
}

calculate();
renderMonths();

</script>

</body>
</html>
