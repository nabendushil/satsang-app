<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create List</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0d0d0d;
    color: #f5c542;
}

/* HEADER */
.header {
    background: #000;
    color: #f5c542;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    border-bottom: 2px solid #f5c542;
}

/* HOME BUTTON */
.header button {
    margin-top: 10px;
    padding: 10px 16px;
    border: 1px solid #f5c542;
    background: transparent;
    color: #f5c542;
    border-radius: 8px;
    cursor: pointer;
}

/* PAGE WRAPPER */
.container {
    padding: 20px;
}

/* TABLE WRAPPER */
.table-wrapper {
    overflow-x: auto;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: #111;
    min-width: 600px;
    border-radius: 10px;
    overflow: hidden;
}

/* HEADER ROW */
th {
    background: #f5c542;
    color: #000;
    padding: 16px;
    font-size: 20px;
}

/* TABLE CELLS */
td {
    padding: 14px;
    border-bottom: 1px solid #222;
    font-size: 18px;
    color: #f5c542;
}

/* NAME COLUMN */
.name-cell {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
}

/* INPUT BOXES */
input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: 1px solid #f5c542;
    border-radius: 8px;
    text-align: center;
    background: #000;
    color: #f5c542;
}

/* SAVE BUTTON */
button[type="submit"] {
    width: 100%;
    padding: 16px;
    margin-top: 14px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    background: #f5c542;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

/* MOBILE FIX */
@media (max-width: 600px) {
    table {
        min-width: 100%;
    }

    td, th {
        font-size: 16px;
        padding: 10px;
    }

    input {
        font-size: 16px;
    }

    .name-cell {
        font-size: 18px;
    }
}
</style>

</head>

<body>

<div class="header">
    ⭐ Create Donation List ⭐
    <br>
    <button onclick="location.href='/'">🏠 Home</button>
</div>

<div class="container">

<form method="POST">

<div class="table-wrapper">

<table>

<tr>
<th>Name</th>
<th>Amount</th>
</tr>

{% for i in range(names|length) %}
<tr>

<td class="name-cell">
{{ names[i] }}
</td>

<td>
<input type="number" name="amount{{i}}" placeholder="Enter Amount">
</td>

</tr>
{% endfor %}

</table>

</div>

<button type="submit">💾 SAVE LIST</button>

</form>

</div>

</body>
</html>
