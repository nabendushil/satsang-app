<!DOCTYPE html>
<html>
<head>
<title>Duplicate Names</title>

<style>
body {
    background: black;
    color: gold;
    text-align: center;
    font-family: Arial;
}

.name-box {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 260px;
    border-radius: 10px;
    border: 1px solid gold;
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
}

.name-box:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h1>🔁 Duplicate Names</h1>

<button onclick="location.href='/'">🏠 Home</button>

{% if duplicates %}
    {% for name in duplicates %}
        <button class="name-box" onclick="loadPerson('{{ name }}')">
            {{ name }}
        </button>
    {% endfor %}
{% else %}
    <p>No duplicate names found ✅</p>
{% endif %}

<div id="result"></div>

<script>

function loadPerson(name) {

    fetch("/search_name", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "name=" + name
    })
    .then(res => res.json())
    .then(data => {

        let result = document.getElementById("result");

        if (data.status === "found") {

            result.innerHTML = `
                <h2>${data.name}</h2>
                <p><b>Family Code:</b> ${data.familycode}</p>
                <p><b>Address:</b> ${data.address}</p>
                ${data.phone ? `<p><b>Phone:</b> ${data.phone}</p>` : ""}
            `;

        } else {
            result.innerHTML = "❌ Not Found";
        }

    });
}

</script>

</body>
</html>
